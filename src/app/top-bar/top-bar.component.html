<mat-toolbar color="primary" [ngStyle]="{'margin-bottom': '20px'}">
    <mat-toolbar-row>
      <span *ngIf="isLogged; else elseBlock" class="top-bar-login-text">Logged as {{displayName}}</span>
      <ng-template #elseBlock>
        <a class="top-bar-login-text" mat-flat-button color="primary" href="{{login_url}}" >Login with Spotify</a>
      </ng-template>
